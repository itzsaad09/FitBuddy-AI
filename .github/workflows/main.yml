name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "✅ .env created."

      - name: Verify CSV Asset Integrity
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found."
            if [[ "$OSTYPE" == "linux-gnu"* ]]; then
              SIZE=$(stat -c%s assets/exercises.csv)
            else
              SIZE=$(stat -f%z assets/exercises.csv)
            fi
            echo "File size: $SIZE bytes"
            if head -c 3 assets/exercises.csv | grep -q $'\xef\xbb\xbf'; then
              echo "⚠️ WARNING: CSV contains UTF-8 BOM. Stripping it..."
            else
              echo "✨ CSV is clean (No BOM)."
            fi
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          # Read the base version from pubspec.yaml (e.g., 1.0.0)
          BASE_VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1 | tr -d '\r')
          RUN_NUMBER=${{ github.run_number }}
          # Dynamic version: 1.0.0.45
          DYNAMIC_VERSION="${BASE_VERSION}.${RUN_NUMBER}"

          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "RUN_NUMBER=$RUN_NUMBER" >> $GITHUB_OUTPUT
          echo "VERSION=$DYNAMIC_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          # 1. Build using the dynamic run number
          flutter build apk --release --build-name=${{ steps.get_version.outputs.VERSION }} --build-number=${{ steps.get_version.outputs.RUN_NUMBER }}

      - name: Rename & Upload
        run: |
          # 2. Rename the file using the dynamic version
          mv build/app/outputs/flutter-apk/app-release.apk "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk"

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "✅ .env created."

      - name: Verify CSV Asset Integrity
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found."
            if [[ "$OSTYPE" == "linux-gnu"* ]]; then
              SIZE=$(stat -c%s assets/exercises.csv)
            else
              SIZE=$(stat -f%z assets/exercises.csv)
            fi
            echo "File size: $SIZE bytes"
            if head -c 3 assets/exercises.csv | grep -q $'\xef\xbb\xbf'; then
              echo "⚠️ WARNING: CSV contains UTF-8 BOM. Stripping it..."
            else
              echo "✨ CSV is clean (No BOM)."
            fi
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          BASE_VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1 | tr -d '\r')
          RUN_NUMBER=${{ github.run_number }}
          DYNAMIC_VERSION="${BASE_VERSION}.${RUN_NUMBER}"

          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "RUN_NUMBER=$RUN_NUMBER" >> $GITHUB_OUTPUT
          echo "VERSION=$DYNAMIC_VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS
        run: |
          flutter clean
          flutter pub get
          # 1. Build using the dynamic run number
          flutter build ios --release --no-codesign --build-name=${{ steps.get_version.outputs.VERSION }} --build-number=${{ steps.get_version.outputs.RUN_NUMBER }}

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa" Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa"

  create_release:
    name: Create GitHub Release
    needs: [build_android, build_ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*/FitBuddyAI-v*.apk,*/FitBuddyAI-v*.ipa"
          # 3. Use the dynamic version as the Tag so every build is a new release
          tag: v${{ needs.build_android.outputs.version }}
          token: ${{ secrets.TOKEN }}
