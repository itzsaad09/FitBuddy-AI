name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat <<EOF > .env
          API_KEY=${{ secrets.API_KEY }}
          EOF

      - name: Verify CSV Asset Integrity
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found."
            echo "File size: $(stat -c%s assets/exercises.csv) bytes"
            echo "First 50 characters: $(head -c 50 assets/exercises.csv)"
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          VERSION_NAME=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1 | tr -d '\r')
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="${VERSION_NAME}+${BUILD_NUMBER}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release --build-name=${{ steps.get_version.outputs.VERSION_NAME }} --build-number=${{ steps.get_version.outputs.BUILD_NUMBER }}

      - name: Rename & Upload
        run: mv build/app/outputs/flutter-apk/app-release.apk "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk"

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat <<EOF > .env
          API_KEY=${{ secrets.API_KEY }}
          EOF

      - name: Verify CSV Asset Integrity
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found."
            stat -f%z assets/exercises.csv
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          VERSION_NAME=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1 | tr -d '\r')
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="${VERSION_NAME}+${BUILD_NUMBER}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS
        run: flutter build ios --release --no-codesign --build-name=${{ steps.get_version.outputs.VERSION_NAME }} --build-number=${{ steps.get_version.outputs.BUILD_NUMBER }}

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa" Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: "FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa"

  create_release:
    name: Create GitHub Release
    needs: [build_android, build_ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*/FitBuddyAI-v*.apk,*/FitBuddyAI-v*.ipa"
          tag: v${{ needs.build_android.outputs.version }}
          token: ${{ secrets.TOKEN }}
