name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Verify CSV Asset Inclusion
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found in assets directory."
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release

      - name: Rename & Upload
        run: mv build/app/outputs/flutter-apk/app-release.apk FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.apk

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Verify CSV Asset Inclusion
        run: |
          if [ -f "assets/exercises.csv" ]; then
            echo "✅ exercises.csv found in assets directory."
          else
            echo "❌ ERROR: assets/exercises.csv is missing!"
            exit 1
          fi

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: FitBuddyAI-v${{ steps.get_version.outputs.VERSION }}.ipa

  create_release:
    name: Create GitHub Release
    needs: [build_android, build_ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*/FitBuddyAI-*.apk,*/FitBuddyAI-*.ipa"
          tag: v${{ needs.build_android.outputs.version }}-b${{ github.run_number }}
          token: ${{ secrets.TOKEN }}
